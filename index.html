<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourceFlow - Secure Source-to-Prompt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f0f12',
                            card: '#1a1a20',
                            border: '#2a2a32',
                            accent: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .folder-toggle {
            cursor: pointer;
            width: 1.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .folder-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .folder-content {
            display: block;
        }

        .folder-content.collapsed {
            display: none;
        }

        .tree-indent {
            margin-left: 1.5rem;
            border-left: 1px solid rgba(0, 0, 0, 0.1);
        }

        .dark .tree-indent {
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #resizer {
            width: 6px;
            cursor: col-resize;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        #resizer:hover,
        #resizer.resizing {
            background-color: #3b82f6;
        }

        #sidePanel {
            transition: width 0.3s ease-in-out, opacity 0.2s;
            overflow: hidden;
            white-space: nowrap;
        }

        #sidePanel.collapsed {
            width: 0;
            opacity: 0;
            padding: 0;
            margin: 0;
            border: 0;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 h-screen flex flex-col transition-colors duration-300 overflow-hidden">
    <!-- Top Nav Stats Bar -->
    <nav
        class="h-14 border-b dark:border-dark-border bg-white dark:bg-dark-card flex items-center justify-between px-4 z-50 shrink-0">
        <div class="flex items-center gap-4">
            <button id="toggleSidePanel"
                class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors"
                data-tippy-content="Toggle Sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded text-white text-sm">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1
                    class="font-black tracking-tight text-lg bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">
                    SourceFlow</h1>
            </div>
        </div>

        <!-- Flat Stats Panel (Global) -->
        <div
            class="flex items-center gap-8 text-[10px] font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500">
            <div class="flex flex-col items-end">
                <span class="opacity-60">Total Selected</span>
                <span id="totalSizeDisplay" class="text-gray-900 dark:text-white font-mono">0 KB</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="opacity-60">Selected Files</span>
                <span id="totalLinesDisplay" class="text-gray-900 dark:text-white font-mono">0</span>
            </div>
            <div class="flex flex-col items-end border-l dark:border-dark-border pl-8">
                <span class="text-blue-500 opacity-80">Global Tokens (est)</span>
                <span id="totalTokensDisplay"
                    class="text-blue-600 dark:text-blue-400 font-mono tracking-normal">0</span>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button id="folderBtn"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-2 px-4 rounded-lg shadow-lg shadow-blue-500/20 transition-all active:scale-95 flex items-center gap-2">
                <i class="fas fa-folder-plus"></i> Select Folder
            </button>
        </div>
    </nav>

    <div class="flex flex-grow overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidePanel"
            class="w-64 border-r dark:border-dark-border bg-white dark:bg-dark-card flex flex-col p-4 gap-6 shrink-0 z-40">
            <div class="space-y-4">
                <h3 class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Settings</h3>
                <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800/50 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                    id="darkModeToggle">
                    <span class="text-sm font-bold flex items-center gap-2">
                        <i class="fas fa-moon text-blue-500"></i> Theme
                    </span>
                    <i class="fas fa-sun text-yellow-500" id="themeIcon"></i>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">File Type Filters</h3>
                <div class="grid grid-cols-2 gap-2" id="fileTypeFilters">
                    <!-- Filters populated by JS -->
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Recent Folders</h3>
                <div id="recentFolders" class="space-y-1 overflow-y-auto no-scrollbar max-h-64">
                    <p class="text-[11px] text-gray-400 italic px-2">No recently used folders</p>
                </div>
            </div>

            <div class="mt-auto pt-4 border-t dark:border-dark-border">
                <div class="text-[10px] text-gray-400 text-center font-medium">SourceFlow v1.3</div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex flex-grow overflow-hidden p-4 gap-2 relative">
            <!-- Left Col: File Explorer -->
            <section id="explorerCol" class="min-w-[300px] flex flex-col gap-4 overflow-hidden" style="width: 40%;">
                <div
                    class="bg-white dark:bg-dark-card rounded-2xl border dark:border-dark-border flex flex-col h-full overflow-hidden shadow-sm">
                    <div
                        class="p-4 border-b dark:border-dark-border flex items-center justify-between bg-white dark:bg-dark-card z-10">
                        <h2 class="font-bold flex items-center gap-2">
                            <i class="fas fa-sitemap text-blue-500"></i> Explorer
                        </h2>
                        <div class="flex gap-2">
                            <button id="openAllBtn"
                                class="flex items-center gap-1.5 px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded transition-colors text-[10px] font-bold text-gray-500 dark:text-gray-400">
                                <i class="fas fa-folder-open"></i> EXPAND ALL
                            </button>
                            <button id="closeAllBtn"
                                class="flex items-center gap-1.5 px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded transition-colors text-[10px] font-bold text-gray-500 dark:text-gray-400">
                                <i class="fas fa-folder"></i> COLLAPSE ALL
                            </button>
                        </div>
                    </div>

                    <div class="p-4 space-y-4 flex-grow flex flex-col overflow-hidden">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                            <input type="text" id="filterInput" placeholder="Filter files..."
                                class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-xl py-2 pl-9 pr-4 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-xs">
                        </div>

                        <div class="flex items-center gap-2">
                            <button id="selectAllTextBtn"
                                class="text-[10px] bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors font-bold flex items-center gap-1">
                                <i class="fas fa-check-double"></i> Select All Text
                            </button>
                        </div>

                        <div id="fileTree"
                            class="flex-grow overflow-auto custom-scrollbar bg-gray-50 dark:bg-gray-800/30 rounded-xl p-2 font-mono text-[11px] relative">
                            <div id="emptyState"
                                class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center gap-3 cursor-pointer group hover:bg-blue-50 dark:hover:bg-blue-900/10 transition-colors rounded-xl">
                                <i
                                    class="fas fa-folder-plus text-4xl text-gray-300 dark:text-gray-700 group-hover:text-blue-500 transition-colors"></i>
                                <span
                                    class="text-sm font-bold text-gray-400 dark:text-gray-600 group-hover:text-blue-500">Select
                                    a folder to start scanning</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Resizer -->
            <div id="resizer" class="h-full rounded-full mx-1"></div>

            <!-- Right Col: Controls & Output -->
            <section id="outputCol" class="flex-grow flex flex-col gap-4 overflow-hidden">
                <div
                    class="bg-white dark:bg-dark-card rounded-2xl border dark:border-dark-border p-4 shadow-sm flex flex-col gap-4 overflow-hidden h-full">
                    <div class="flex items-center justify-between pb-2 border-b dark:border-dark-border">
                        <h2 class="font-bold flex items-center gap-2">
                            <i class="fas fa-terminal text-emerald-500"></i> Generation
                        </h2>

                        <!-- Preview Stats Tally -->
                        <div id="previewTally"
                            class="flex items-center gap-4 text-[10px] font-bold uppercase text-gray-400">
                            <div class="flex items-center gap-1.5">
                                <span>Preview:</span>
                                <span id="previewSize" class="text-emerald-500 font-mono">0 KB</span>
                            </div>
                            <div class="flex items-center gap-1.5 border-l dark:border-dark-border pl-4">
                                <span>Tokens:</span>
                                <span id="previewTokens" class="text-blue-500 font-mono">0</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-4 items-start shrink-0">
                        <div class="flex flex-col gap-2 w-full md:w-[48%]">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <input type="checkbox" id="includeGoal" class="w-4 h-4 rounded border-gray-300">
                                    <label for="includeGoal" class="text-xs font-bold py-1">Include Project Goal</label>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input type="checkbox" id="includeStructure" class="w-4 h-4 rounded border-gray-300"
                                        checked>
                                    <label for="includeStructure" class="text-xs font-bold py-1">Include
                                        Structure</label>
                                </div>
                            </div>
                            <textarea id="goalText"
                                class="hidden w-full bg-gray-50 dark:bg-gray-800 border-none rounded-lg text-[10px] p-2 h-14 outline-none focus:ring-1 focus:ring-blue-500"
                                placeholder="What should the AI achieve?"></textarea>
                        </div>
                        <div class="w-full md:w-[48%] flex flex-col gap-2">
                            <div class="flex items-center justify-between text-[11px] font-bold">
                                <div class="flex items-center gap-2"><i
                                        class="fas fa-magic text-yellow-500 scale-75"></i> Transformation</div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <label
                                    class="flex items-center gap-2 p-1.5 bg-gray-50 dark:bg-gray-800 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <input type="checkbox" id="removeComments" class="scale-90 transform-trigger">
                                    <span class="text-[10px] whitespace-nowrap">No Comments</span>
                                </label>
                                <label
                                    class="flex items-center gap-2 p-1.5 bg-gray-50 dark:bg-gray-800 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <input type="checkbox" id="minifyOutput" class="scale-90 transform-trigger">
                                    <span class="text-[10px] whitespace-nowrap">Minify</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div
                        class="flex-grow flex flex-col relative overflow-hidden bg-gray-100 dark:bg-gray-900/40 rounded-xl p-1">
                        <div id="loadingIndicator"
                            class="hidden absolute inset-0 bg-white/50 dark:bg-dark-bg/50 backdrop-blur-sm z-50 flex items-center justify-center rounded-xl">
                            <div class="flex flex-col items-center gap-3">
                                <div
                                    class="w-8 h-8 border-3 border-blue-500 border-t-transparent rounded-full animate-spin">
                                </div>
                                <span class="text-xs font-bold text-blue-600">Processing...</span>
                            </div>
                        </div>
                        <textarea id="combinedOutput"
                            class="w-full h-full bg-transparent border-none p-4 font-mono text-[11px] outline-none custom-scrollbar resize-none"
                            readonly placeholder="Output will appear here..."></textarea>
                    </div>

                    <div class="flex items-center justify-between gap-4 pt-1">
                        <button id="combineBtn"
                            class="flex-grow bg-blue-600 hover:bg-blue-700 text-white font-black py-3 px-8 rounded-xl shadow-lg shadow-blue-500/20 transform transition-all active:scale-95 flex items-center justify-center gap-3 text-sm">
                            <i class="fas fa-bolt"></i> GENERATE PROMPT
                        </button>
                        <div class="flex gap-2">
                            <button id="copyBtn"
                                class="flex items-center gap-2 px-4 py-3 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl text-xs font-bold transition-all">
                                <i class="fas fa-copy text-blue-500"></i> COPY
                            </button>
                            <button id="downloadBtn"
                                class="flex items-center gap-2 px-4 py-3 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl text-xs font-bold transition-all">
                                <i class="fas fa-download text-indigo-500"></i> DOWNLOAD
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for File Preview (no animation) -->
    <div id="fileModal"
        class="fixed inset-0 z-50 hidden flex items-center justify-center p-8 bg-black/60 backdrop-blur-sm">
        <div
            class="bg-white dark:bg-dark-card w-full max-w-6xl h-full rounded-2xl shadow-2xl flex flex-col overflow-hidden">
            <div class="p-4 border-b dark:border-dark-border flex items-center justify-between shrink-0">
                <h3 id="modalTitle" class="font-bold text-sm truncate dark:text-gray-300">File Preview</h3>
                <button id="closeModal" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="flex-grow overflow-auto p-6 custom-scrollbar bg-gray-50 dark:bg-transparent">
                <pre id="modalContent"
                    class="font-mono text-xs whitespace-pre-wrap break-words dark:text-gray-400"></pre>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/tippy.js@6"></script>
    <script src="https://cdn.jsdelivr.net/npm/terser@5.14.2/dist/bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-minifier-terser@7.0.0/dist/html-minifier-terser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/csso@5.0.5/dist/csso.min.js"></script>
    <script>
        class GitIgnore {
            constructor(p) { this.rules = p.split('\n').filter(l => l && !l.startsWith('#')).map(r => { let n = r.startsWith('!'); if (n) r = r.slice(1); return { re: new RegExp(r.replace(/\./g, '\\.').replace(/\*\*/g, '.*').replace(/\*/g, '[^/]*')), isNeg: n }; }); }
            ignores(p) { let ig = false; this.rules.forEach(r => { if (r.re.test(p)) ig = !r.isNeg; }); return ig || p.includes('node_modules'); }
        }

        // Logic variables
        let fileHandles = [], folderHandle = null, ignoreFilter = null, pathToElement = {};

        // UI Elements
        const explorerCol = document.getElementById('explorerCol'), resizer = document.getElementById('resizer'), sidePanel = document.getElementById('sidePanel'),
            fileTree = document.getElementById('fileTree'), combineBtn = document.getElementById('combineBtn'), combinedOutput = document.getElementById('combinedOutput'),
            totalSizeDisplay = document.getElementById('totalSizeDisplay'), totalTokensDisplay = document.getElementById('totalTokensDisplay'),
            includeGoal = document.getElementById('includeGoal'), goalText = document.getElementById('goalText'), includeStructure = document.getElementById('includeStructure'),
            previewSize = document.getElementById('previewSize'), previewTokens = document.getElementById('previewTokens');

        // Resizer Logic
        let isResizing = false;
        resizer.onmousedown = (e) => { isResizing = true; resizer.classList.add('resizing'); document.body.style.cursor = 'col-resize'; };
        document.onmousemove = (e) => {
            if (!isResizing) return;
            let left = (e.clientX / window.innerWidth) * 100;
            if (left > 20 && left < 80) explorerCol.style.width = `${left}%`;
        };
        document.onmouseup = () => { isResizing = false; resizer.classList.remove('resizing'); document.body.style.cursor = ''; };

        // Sidebar Toggle
        document.getElementById('toggleSidePanel').onclick = () => sidePanel.classList.toggle('collapsed');

        // Dark Mode
        function setDark(is) {
            document.documentElement.classList.toggle('dark', is);
            localStorage.setItem('theme', is ? 'dark' : 'light');
            document.getElementById('themeIcon').className = is ? 'fas fa-moon text-blue-500' : 'fas fa-sun text-yellow-500';
        }
        document.getElementById('darkModeToggle').onclick = () => setDark(!document.documentElement.classList.contains('dark'));
        setDark(localStorage.getItem('theme') !== 'light');

        // Goal Text Toggle
        includeGoal.onchange = () => goalText.classList.toggle('hidden', !includeGoal.checked);

        // Files Logic
        function isText(n) { return ['.vue', '.js', '.ts', '.tsx', '.jsx', '.css', '.html', '.json', '.md', '.py', '.go', '.rs', '.php', '.rb', '.txt', '.sh', '.yaml', '.yml', '.lock', '.toml'].some(e => n.toLowerCase().endsWith(e)) || ['Makefile', 'Dockerfile', 'root'].includes(n); }

        async function getTree(h, p = '', c = fileTree, isRoot = false) {
            const list = []; for await (const e of h.values()) list.push(e);
            list.sort((a, b) => a.kind === b.kind ? a.name.localeCompare(b.name) : a.kind === 'directory' ? -1 : 1);

            // If it's the root, we create the root node first
            if (isRoot) {
                const rootDiv = document.createElement('div');
                rootDiv.className = 'tree-line mb-1';
                const row = document.createElement('div'); row.className = 'flex items-center gap-1 hover:bg-gray-200/50 dark:hover:bg-gray-800/20 rounded px-1 transition-colors';
                const tug = document.createElement('span'); tug.className = 'folder-toggle text-[8px] text-gray-500'; tug.innerHTML = '<i class="fas fa-chevron-down"></i>';
                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'w-3.5 h-3.5 rounded border-gray-300 dark:border-gray-600'; cb.dataset.path = 'root'; cb.dataset.type = 'dir';
                const lbl = document.createElement('span'); lbl.className = 'font-bold py-1 cursor-pointer dark:text-gray-300 flex items-center gap-1.5'; lbl.innerHTML = `<i class="fas fa-folder text-blue-500"></i> ${h.name} <span class="text-[9px] text-blue-500 opacity-60">(ROOT)</span>`;
                const sub = document.createElement('div'); sub.className = 'folder-content tree-indent';
                const toggle = () => { sub.classList.toggle('collapsed'); tug.classList.toggle('collapsed'); tug.innerHTML = sub.classList.contains('collapsed') ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-chevron-down"></i>'; };
                tug.onclick = toggle; lbl.onclick = toggle;
                row.append(tug, cb, lbl); rootDiv.append(row, sub);
                c.append(rootDiv);
                c = sub; // Following entries go into root's sub
            }

            for (const e of list) {
                const ep = p ? `${p}/${e.name}` : e.name;
                if (ignoreFilter && ignoreFilter.ignores(ep)) continue;
                const div = document.createElement('div'); div.className = 'tree-line mb-0.5';
                div.dataset.filename = e.name.toLowerCase();

                if (e.kind === 'directory') {
                    const row = document.createElement('div'); row.className = 'flex items-center gap-1 hover:bg-gray-200/50 dark:hover:bg-gray-800/20 rounded px-1 transition-colors';
                    const tug = document.createElement('span'); tug.className = 'folder-toggle collapsed text-[8px] text-gray-500'; tug.innerHTML = '<i class="fas fa-chevron-right"></i>';
                    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'w-3 h-3 rounded border-gray-300 dark:border-gray-600'; cb.dataset.path = ep; cb.dataset.type = 'dir';
                    const lbl = document.createElement('span'); lbl.className = 'font-bold py-0.5 cursor-pointer dark:text-gray-300'; lbl.innerHTML = `<i class="fas fa-folder text-blue-400"></i> ${e.name}`;
                    const sub = document.createElement('div'); sub.className = 'folder-content collapsed tree-indent';
                    const toggle = () => { sub.classList.toggle('collapsed'); tug.classList.toggle('collapsed'); tug.innerHTML = sub.classList.contains('collapsed') ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-chevron-down"></i>'; };
                    tug.onclick = toggle; lbl.onclick = toggle;
                    row.append(tug, cb, lbl); div.append(row, sub);
                    await getTree(await h.getDirectoryHandle(e.name), ep, sub);
                } else {
                    const row = document.createElement('div'); row.className = 'flex items-center gap-1 hover:bg-gray-200/50 dark:hover:bg-gray-800/20 rounded px-1 pl-4 transition-colors';
                    const text = isText(e.name);
                    const fh = await h.getFileHandle(e.name); const f = await fh.getFile();
                    if (text) {
                        fileHandles.push({ h: fh, p: ep, s: f.size, n: e.name });
                        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'w-3 h-3 rounded border-gray-300 dark:border-gray-600'; cb.dataset.path = ep; cb.dataset.type = 'file';
                        row.append(cb);
                    }
                    const lbl = document.createElement('span'); lbl.className = `py-0.5 ${text ? 'dark:text-gray-400 cursor-pointer hover:text-blue-500' : 'text-gray-400 opacity-50'}`;
                    lbl.innerHTML = `<i class="far fa-${text ? 'file-code' : 'file'} scale-90"></i> ${e.name} <span class="text-[9px] opacity-40">(${(f.size / 1024).toFixed(1)}K)</span>`;
                    if (text) lbl.onclick = async () => {
                        const mod = document.getElementById('fileModal');
                        document.getElementById('modalTitle').textContent = ep;
                        document.getElementById('modalContent').textContent = await (await fh.getFile()).text();
                        mod.classList.remove('hidden');
                    };
                    row.append(lbl); div.append(row);
                }
                c.append(div);
            }
        }

        async function selectFolder() {
            try {
                folderHandle = await window.showDirectoryPicker();
                fileTree.innerHTML = ''; fileHandles = [];
                ignoreFilter = new GitIgnore('.git\nnode_modules\n.next\ndist\nbuild\nout\n.cache');
                await getTree(folderHandle, '', fileTree, true);
                document.getElementById('refreshBtn').classList.remove('hidden');
                document.getElementById('emptyState').classList.add('hidden');
                saveRecent(folderHandle.name);
            } catch (e) { }
        }
        document.getElementById('folderBtn').onclick = selectFolder;
        document.getElementById('emptyState').onclick = selectFolder;

        function saveRecent(n) {
            let r = JSON.parse(localStorage.getItem('recent_folders') || '[]');
            r = r.filter(x => x !== n); r.unshift(n); if (r.length > 8) r.pop();
            localStorage.setItem('recent_folders', JSON.stringify(r));
            renderRecent();
        }
        function renderRecent() {
            const r = JSON.parse(localStorage.getItem('recent_folders') || '[]');
            const c = document.getElementById('recentFolders'); c.innerHTML = '';
            if (!r.length) c.innerHTML = '<p class="text-[11px] text-gray-400 italic px-2">No recently used folders</p>';
            r.forEach(f => {
                const b = document.createElement('div'); b.className = 'text-[11px] p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg cursor-pointer flex items-center gap-2 overflow-hidden text-ellipsis';
                b.innerHTML = `<i class="fas fa-history text-gray-400"></i> ${f}`;
                b.onclick = () => selectFolder(); // Triggers picker again as we can't store handle perms
                c.append(b);
            });
        }
        renderRecent();

        fileTree.onchange = (e) => {
            if (e.target.dataset.type === 'dir') {
                const p = e.target.dataset.path === 'root' ? '' : e.target.dataset.path + '/';
                fileTree.querySelectorAll(`input[type="checkbox"][data-path^="${p}"]`).forEach(c => c.checked = e.target.checked);
            }
            updateGlobalTally();
        };

        function updateGlobalTally() {
            let s = 0, count = 0; fileTree.querySelectorAll('input[type="checkbox"]:checked[data-type="file"]').forEach(cb => {
                const f = fileHandles.find(x => x.p === cb.dataset.path); if (f) { s += f.s; count++; }
            });
            totalSizeDisplay.textContent = (s / 1024).toFixed(1) + ' KB';
            totalTokensDisplay.textContent = Math.ceil(s / 4).toLocaleString();
            document.getElementById('totalLinesDisplay').textContent = count;
        }

        // Live Search
        document.getElementById('filterInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const lines = fileTree.querySelectorAll('.tree-line');
            lines.forEach(l => {
                const match = !val || l.dataset.filename?.includes(val);
                l.style.display = match ? 'block' : 'none';
                if (match && val) {
                    let parent = l.parentElement;
                    while (parent && parent !== fileTree) {
                        if (parent.classList.contains('folder-content')) {
                            parent.classList.remove('collapsed');
                            const toggle = parent.previousElementSibling?.querySelector('.folder-toggle');
                            if (toggle) { toggle.classList.remove('collapsed'); toggle.innerHTML = '<i class="fas fa-chevron-down"></i>'; }
                        }
                        parent = parent.parentElement;
                    }
                }
            });
        };

        // Explorer Controls
        document.getElementById('openAllBtn').onclick = () => {
            fileTree.querySelectorAll('.folder-content, .folder-toggle').forEach(el => el.classList.remove('collapsed'));
            fileTree.querySelectorAll('.folder-toggle').forEach(t => t.innerHTML = '<i class="fas fa-chevron-down"></i>');
        };
        document.getElementById('closeAllBtn').onclick = () => {
            fileTree.querySelectorAll('.folder-content:not(:first-child), .folder-toggle:not(:first-child)').forEach(el => el.classList.add('collapsed'));
            fileTree.querySelectorAll('.folder-toggle').forEach(t => t.innerHTML = '<i class="fas fa-chevron-right"></i>');
        };
        document.getElementById('selectAllTextBtn').onclick = () => {
            fileTree.querySelectorAll('input[type="checkbox"][data-type="file"]').forEach(cb => cb.checked = true);
            updateGlobalTally();
        };

        // File Type Filters
        const types = ['vue', 'ts', 'js', 'json', 'md', 'html', 'css', 'py'];
        const ftContainer = document.getElementById('fileTypeFilters');
        types.forEach(t => {
            const b = document.createElement('button');
            b.className = 'text-[9px] font-bold bg-gray-50 dark:bg-gray-800 py-1.5 rounded-lg border dark:border-dark-border hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors uppercase';
            b.textContent = t;
            b.onclick = () => {
                fileTree.querySelectorAll('input[type="checkbox"][data-type="file"]').forEach(cb => {
                    if (cb.dataset.path.toLowerCase().endsWith('.' + t) || (t === 'ts' && cb.dataset.path.toLowerCase().endsWith('.tsx'))) cb.checked = true;
                });
                updateGlobalTally();
                showGlobalMessage(`Selected all ${t.toUpperCase()} files`, 'success');
            };
            ftContainer.append(b);
        });

        // Generation logic
        const minifyJS = s => s.replace(/\s+/g, ' ').replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '').trim();
        const cleanComments = s => s.replace(/\/\*[\s\S]*?\*\/|([^:]|^)\/\/.*$/gm, '$1').trim();

        function getProjectStructure() {
            let res = "PROJECT STRUCTURE:\n";
            const items = fileTree.querySelectorAll('.tree-line');
            items.forEach(it => {
                let depth = 0; let p = it.parentElement; while (p && p !== fileTree) { if (p.classList.contains('folder-content')) depth++; p = p.parentElement; }
                const isDir = it.querySelector('input')?.dataset.type === 'dir';
                const name = it.querySelector('span:last-child').textContent.split('(')[0].trim().replace('ROOT', '').trim();
                res += "  ".repeat(depth) + (isDir ? "📁 " : "📄 ") + name + "\n";
            });
            return res + "\n";
        }

        combineBtn.onclick = async () => {
            const list = Array.from(fileTree.querySelectorAll('input[type="checkbox"]:checked[data-type="file"]')).map(cb => cb.dataset.path);
            if (!list.length && !includeStructure.checked) return showGlobalMessage('Select files first');

            document.getElementById('loadingIndicator').classList.remove('hidden');
            let res = '';
            if (includeGoal.checked) res += `GOAL:\n${goalText.value}\n\n`;
            if (includeStructure.checked) res += getProjectStructure();

            for (const p of list) {
                const f = await (await fileHandles.find(x => x.p === p).h.getFile()).text();
                let txt = f;
                if (document.getElementById('removeComments').checked) txt = cleanComments(txt);
                if (document.getElementById('minifyOutput').checked) txt = minifyJS(txt);
                res += `--- FILE: ${p} ---\n${txt}\n\n`;
            }
            combinedOutput.value = res.trim();
            updatePreviewTally();
            document.getElementById('loadingIndicator').classList.add('hidden');
        };

        function updatePreviewTally() {
            const val = combinedOutput.value;
            const size = new Blob([val]).size;
            previewSize.textContent = (size / 1024).toFixed(1) + ' KB';
            previewTokens.textContent = Math.ceil(size / 4).toLocaleString();
        }

        // Live Tally Updates on Transformation Toggles
        document.querySelectorAll('.transform-trigger').forEach(el => el.onchange = () => { if (combinedOutput.value) combineBtn.click(); });

        function showGlobalMessage(m, t = 'error') {
            const d = document.createElement('div');
            d.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg text-xs font-bold text-white z-[100] animate__animated animate__fadeInUp ${t === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            d.textContent = m; document.body.append(d);
            setTimeout(() => { d.classList.replace('animate__fadeInUp', 'animate__fadeOutDown'); setTimeout(() => d.remove(), 500); }, 3000);
        }

        document.getElementById('closeModal').onclick = () => document.getElementById('fileModal').classList.add('hidden');
        document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(combinedOutput.value); showGlobalMessage('Copied to clipboard!', 'success'); };
        document.getElementById('downloadBtn').onclick = () => {
            const b = new Blob([combinedOutput.value], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'prompt.txt'; a.click();
        };

        // Tooltips
        tippy('[data-tippy-content]', { theme: 'light-border', arrow: false });
    </script>
</body>

</html>
